name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      # Staging commits (Contents API) should not burn Actions minutes
      - 'packages/custom-icons/staging/**'
  pull_request:
    paths-ignore:
      - 'packages/custom-icons/staging/**'

jobs:
  build:
    # Skip Apply bot commits on main — Pages redeploys the browser; full CI is redundant.
    if: >
      github.event_name != 'push' ||
      !(startsWith(github.event.head_commit.message, 'Apply staged icons from icon browser:'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Assert catalog has no Ant Design assets
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const catalog = JSON.parse(
            fs.readFileSync('packages/catalog/src/data/icons.json', 'utf8'),
          )
          const antSets = catalog.sets.filter(
            (s) => s.id === 'ant' || s.source === 'ant',
          )
          const antIcons = catalog.icons.filter((i) => i.source === 'ant')
          if (antSets.length || antIcons.length) {
            console.error(
              `Catalog still contains Ant Design: ${antSets.length} set(s), ${antIcons.length} icon(s)`,
            )
            process.exit(1)
          }
          const unexpected = [
            ...new Set(
              catalog.icons
                .map((i) => i.source)
                .filter((s) => s !== 'iconify' && s !== 'custom'),
            ),
          ]
          if (unexpected.length) {
            console.error('Unexpected catalog sources:', unexpected.join(', '))
            process.exit(1)
          }
          console.log(
            `Catalog OK: ${catalog.icons.length} icons across ${catalog.sets.length} sets`,
          )
          NODE
          if grep -R --include='*.json' --include='*.yaml' --include='*.ts' --include='*.tsx' --include='*.mjs' -n '@ant-design' \
            pnpm-lock.yaml packages apps/web tooling/catalog-gen 2>/dev/null \
            | grep -v '/node_modules/' | grep -v '/CHANGELOG.md' | grep -q .; then
            echo 'Found leftover @ant-design references'
            grep -R --include='*.json' --include='*.yaml' --include='*.ts' --include='*.tsx' --include='*.mjs' -n '@ant-design' \
              pnpm-lock.yaml packages apps/web tooling/catalog-gen 2>/dev/null \
              | grep -v '/node_modules/' | grep -v '/CHANGELOG.md' || true
            exit 1
          fi
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
