name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      # Staging + property-only metadata edits are everyday designer work —
      # do not burn Actions minutes (see also [skip ci] on sidebar commits).
      - 'packages/custom-icons/staging/**'
      - 'packages/custom-icons/metadata.json'
  pull_request:
    paths-ignore:
      - 'packages/custom-icons/staging/**'
      - 'packages/custom-icons/metadata.json'

jobs:
  build:
    # Skip Apply bot commits on main — Pages redeploys the browser; full CI is redundant.
    # Also skip sidebar property commits if they ever touch more than metadata.json.
    if: >
      github.event_name != 'push' ||
      (
        !startsWith(github.event.head_commit.message, 'Apply staged icons from icon browser:') &&
        !startsWith(github.event.head_commit.message, '[skip ci]')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Assert catalog is brand-only (no Ant / Iconify sets)
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const catalog = JSON.parse(
            fs.readFileSync('packages/catalog/src/data/icons.json', 'utf8'),
          )
          const forbiddenSetIds = new Set(['ant', 'mdi', 'lucide', 'heroicons'])
          const allowedSetIds = new Set(['custom', 'custom-images'])
          const allowedDesignSources = new Set([
            'iconify',
            'custom',
            'modified',
          ])
          const badSets = catalog.sets.filter(
            (s) =>
              s.source !== 'custom' ||
              forbiddenSetIds.has(s.id) ||
              !allowedSetIds.has(s.id),
          )
          const badIcons = catalog.icons.filter(
            (i) =>
              !(i.id.startsWith('ci:') || i.id.startsWith('img:')) ||
              !allowedSetIds.has(i.set) ||
              !allowedDesignSources.has(i.source ?? 'custom'),
          )
          if (badSets.length || badIcons.length) {
            console.error(
              `Catalog must be brand-only: ${badSets.length} bad set(s), ${badIcons.length} bad icon(s)`,
            )
            process.exit(1)
          }
          console.log(
            `Catalog OK: ${catalog.icons.length} brand icons across ${catalog.sets.length} sets`,
          )
          NODE
          if grep -R --include='*.json' --include='*.yaml' --include='*.ts' --include='*.tsx' --include='*.mjs' -nE '@ant-design|@iconify-json/' \
            pnpm-lock.yaml packages apps/web tooling/catalog-gen 2>/dev/null \
            | grep -v '/node_modules/' | grep -v '/CHANGELOG.md' | grep -q .; then
            echo 'Found leftover @ant-design or @iconify-json references'
            grep -R --include='*.json' --include='*.yaml' --include='*.ts' --include='*.tsx' --include='*.mjs' -nE '@ant-design|@iconify-json/' \
              pnpm-lock.yaml packages apps/web tooling/catalog-gen 2>/dev/null \
              | grep -v '/node_modules/' | grep -v '/CHANGELOG.md' || true
            exit 1
          fi
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
