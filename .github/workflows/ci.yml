name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      # Staging commits (Contents API) should not burn Actions minutes
      - 'packages/custom-icons/staging/**'
  pull_request:
    paths-ignore:
      - 'packages/custom-icons/staging/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
