name: Deploy icon browser

on:
  push:
    branches: [main, master]
    paths-ignore:
      # Staging + property-only metadata edits should not redeploy Pages.
      # Sidebar commits also use [skip ci]. Apply / SVG / catalog changes still deploy.
      - 'packages/custom-icons/staging/**'
      - 'packages/custom-icons/metadata.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Rebuild catalog JSON from generator so Pages never ships stale
      # Ant/Iconify sets if icons.json was forgotten in a commit.
      - name: Regenerate catalog source
        run: pnpm catalog:gen:src
      - name: Assert catalog is brand-only
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const catalog = JSON.parse(
            fs.readFileSync('packages/catalog/src/data/icons.json', 'utf8'),
          )
          const allowedSetIds = new Set(['custom', 'custom-images'])
          const allowedDesignSources = new Set([
            'iconify',
            'custom',
            'modified',
          ])
          const badSets = catalog.sets.filter(
            (s) => s.source !== 'custom' || !allowedSetIds.has(s.id),
          )
          const badIcons = catalog.icons.filter(
            (i) =>
              !(i.id.startsWith('ci:') || i.id.startsWith('img:')) ||
              !allowedSetIds.has(i.set) ||
              !allowedDesignSources.has(i.source ?? 'custom'),
          )
          if (badSets.length || badIcons.length) {
            console.error(
              `Catalog must be brand-only: ${badSets.length} bad set(s), ${badIcons.length} bad icon(s)`,
            )
            process.exit(1)
          }
          console.log(
            `Catalog OK for Pages: ${catalog.icons.length} icons across ${catalog.sets.length} sets`,
          )
          NODE
      - name: Build icon browser
        run: pnpm --filter @JasonTuTu2/icons-web... build
        env:
          # Optional override via repo variable ICON_BROWSER_REPO (owner/name).
          VITE_GITHUB_REPO: ${{ vars.ICON_BROWSER_REPO || github.repository }}
          # Optional auth API (Cloudflare Worker). When set, Sign in replaces Apply/Publish PATs.
          VITE_AUTH_API_URL: ${{ vars.AUTH_API_URL }}
          # Embedded for library reads / conflict checks (Contents API).
          # Requires contents:write + actions:write on the PAT (same bot as Apply Actions).
          VITE_GITHUB_TOKEN: ${{ secrets.ICON_BROWSER_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
