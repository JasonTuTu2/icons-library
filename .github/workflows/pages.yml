name: Deploy icon browser

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'packages/custom-icons/staging/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Rebuild catalog JSON from generator so Pages never ships a stale ant set
      # (or other removed sources) if icons.json was forgotten in a commit.
      - name: Regenerate catalog source
        run: pnpm catalog:gen:src
      - name: Assert catalog has no Ant Design assets
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const catalog = JSON.parse(
            fs.readFileSync('packages/catalog/src/data/icons.json', 'utf8'),
          )
          const antIcons = catalog.icons.filter((i) => i.source === 'ant')
          const antSets = catalog.sets.filter(
            (s) => s.id === 'ant' || s.source === 'ant',
          )
          if (antSets.length || antIcons.length) {
            console.error(
              `Catalog still contains Ant Design: ${antSets.length} set(s), ${antIcons.length} icon(s)`,
            )
            process.exit(1)
          }
          console.log(
            `Catalog OK for Pages: ${catalog.icons.length} icons across ${catalog.sets.length} sets`,
          )
          NODE
      - name: Build icon browser
        run: pnpm --filter @JasonTuTu2/icons-web... build
        env:
          # Optional override via repo variable ICON_BROWSER_REPO (owner/name).
          VITE_GITHUB_REPO: ${{ vars.ICON_BROWSER_REPO || github.repository }}
          # Embedded so anyone on Pages can stage / apply / publish (temporary open access).
          # Requires contents:write + actions:write on the PAT.
          VITE_GITHUB_TOKEN: ${{ secrets.ICON_BROWSER_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
