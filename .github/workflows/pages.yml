name: Deploy icon browser

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'packages/custom-icons/staging/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm catalog:gen
      - name: Build icon browser
        run: pnpm --filter @JasonTuTu2/icons-web... build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.ICON_BROWSER_TOKEN }}
          VITE_GITHUB_REPO: ${{ github.repository }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
