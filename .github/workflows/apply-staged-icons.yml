name: Apply staged icons

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-staged-icons
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ICON_BROWSER_TOKEN }}

      - id: promote
        name: Promote staging adds and removals
        run: |
          set -euo pipefail
          STAGING=packages/custom-icons/staging
          MONO_DST=packages/custom-icons/svg
          COLOR_DST=packages/custom-icons/svg/color
          GRAD_DST=packages/custom-icons/svg/gradient
          IMG_DST=packages/custom-icons/images
          mkdir -p "$MONO_DST" "$COLOR_DST" "$GRAD_DST" "$IMG_DST" "$STAGING/remove" "$STAGING/images" "$STAGING/gradient"
          names=()

          shopt -s nullglob
          for f in "$STAGING"/mono/*.svg; do
            base=$(basename "$f")
            mv -f "$f" "$MONO_DST/$base"
            names+=("ci:${base%.svg}")
            echo "Promoted mono/$base"
          done
          for f in "$STAGING"/color/*.svg; do
            base=$(basename "$f")
            mv -f "$f" "$COLOR_DST/$base"
            names+=("ci:${base%.svg}")
            echo "Promoted color/$base"
          done
          for f in "$STAGING"/gradient/*.svg; do
            base=$(basename "$f")
            mv -f "$f" "$GRAD_DST/$base"
            names+=("ci:${base%.svg}")
            echo "Promoted gradient/$base"
          done
          for f in "$STAGING"/images/*.{png,jpg,jpeg}; do
            [[ -e "$f" ]] || continue
            base=$(basename "$f")
            mv -f "$f" "$IMG_DST/$base"
            name="${base%.*}"
            names+=("img:${name}")
            echo "Promoted images/$base"
          done
          for f in "$STAGING"/remove/*.remove; do
            name=$(basename "$f" .remove)
            removed=0
            if [[ -f "$MONO_DST/$name.svg" ]]; then
              rm -f "$MONO_DST/$name.svg"
              removed=1
              echo "Removed mono/$name.svg"
            fi
            if [[ -f "$COLOR_DST/$name.svg" ]]; then
              rm -f "$COLOR_DST/$name.svg"
              removed=1
              echo "Removed color/$name.svg"
            fi
            if [[ -f "$GRAD_DST/$name.svg" ]]; then
              rm -f "$GRAD_DST/$name.svg"
              removed=1
              echo "Removed gradient/$name.svg"
            fi
            for ext in png jpg jpeg; do
              if [[ -f "$IMG_DST/$name.$ext" ]]; then
                rm -f "$IMG_DST/$name.$ext"
                removed=1
                echo "Removed images/$name.$ext"
              fi
            done
            rm -f "$f"
            if [[ "$removed" -eq 1 ]]; then
              names+=("-${name}")
            else
              echo "Removal marker for $name had no library asset"
            fi
          done
          shopt -u nullglob

          if [ ${#names[@]} -eq 0 ]; then
            echo "Nothing staged to apply"
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "names=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS=', '
          echo "count=${#names[@]}" >> "$GITHUB_OUTPUT"
          echo "names=${names[*]}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.promote.outputs.count != '0'
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        if: steps.promote.outputs.count != '0'
        with:
          node-version: 20
          cache: pnpm

      - if: steps.promote.outputs.count != '0'
        run: pnpm install --frozen-lockfile

      # Source JSON only — Pages builds package dist/ from the committed files.
      - if: steps.promote.outputs.count != '0'
        run: pnpm catalog:gen:src

      - name: Commit and push
        if: steps.promote.outputs.count != '0'
        env:
          ICON_NAMES: ${{ steps.promote.outputs.names }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/custom-icons packages/catalog
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Apply staged icons from icon browser: ${ICON_NAMES}"
          git push
