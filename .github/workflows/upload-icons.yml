name: Upload icons (legacy)

# Deprecated: Pages UI now stages via Contents API and uses apply-staged-icons.yml.
# Kept dormant so old repository_dispatch callers fail closed with an explanation.
on:
  repository_dispatch:
    types: [icon-upload]

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        run: |
          echo "icon-upload is retired."
          echo "Stage SVGs with the icon browser (Contents API), then run Apply staged icons."
          exit 1
