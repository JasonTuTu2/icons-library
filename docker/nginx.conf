server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA + figma.html multi-page build
  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /figma.html {
    try_files /figma.html =404;
  }

  # Cache hashed assets; HTML always revalidated
  location ~* \.(js|css|png|jpg|jpeg|svg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
