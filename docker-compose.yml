# Local full stack: icon browser + auth API + Redis.
# Production Pages + Cloudflare Worker on main are unchanged.
#
#   cp .env.example .env   # fill secrets
#   docker compose up --build

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - auth-redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "${AUTH_PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      PORT: "8787"
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:8787}
        VITE_GITHUB_REPO: ${GITHUB_REPO:-JasonTuTu2/icons-library}
        VITE_BASE_PATH: /
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - auth
    restart: unless-stopped

volumes:
  auth-redis:
